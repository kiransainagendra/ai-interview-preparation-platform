{% extends 'base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:85vh;">
    <div class="col-md-7 col-lg-6">
        <div class="glass-card">
            <h2 class="fw-bold mb-2">Upload Your Resume</h2>
            <p class="text-muted-custom mb-4">
                Upload a PDF resume. AI will analyze it and generate interview preparation insights.
            </p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">Resume PDF</label>
                    {{ form.resume_file|add_class:"form-control form-control-lg" }}
                </div>

                <button class="btn btn-custom w-100">
                    Analyze Resume
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
